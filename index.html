<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop-Wahl</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ede8;
    --card: #ffffff;
    --accent: #e84c3d;
    --accent2: #2d6ef6;
    --text: #1a1a2e;
    --muted: #7a7a8a;
    --border: #ddd;
    --selected-bg: #e84c3d;
    --selected-text: #fff;
    --tag-bg: #f5f3ef;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--text);
    color: #fff;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
  }

  header h1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 900;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: -1px;
    line-height: 1.1;
  }

  header h1 span { color: var(--accent); }

  header p {
    margin-top: .75rem;
    font-size: 1rem;
    color: #bbb;
  }

  .counter-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--text);
    border-top: 1px solid #333;
    padding: .75rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .counter-text {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: #fff;
  }

  .counter-text span {
    color: var(--accent);
    font-size: 1.4rem;
  }

  .progress-wrap {
    flex: 1;
    max-width: 300px;
    background: #333;
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width .3s ease;
    width: 0%;
  }

  .workshops {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  .workshop-card {
    background: var(--card);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 1.25rem 1.25rem 1rem;
    cursor: pointer;
    transition: transform .15s, border-color .2s, box-shadow .2s;
    position: relative;
    user-select: none;
  }

  .workshop-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,.09);
    border-color: var(--accent);
  }

  .workshop-card.selected {
    border-color: var(--accent);
    background: #fff5f4;
    box-shadow: 0 0 0 4px rgba(232,76,61,.12);
  }

  .workshop-card.disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  .workshop-card.disabled:hover {
    transform: none;
    box-shadow: none;
    border-color: transparent;
  }

  .card-check {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
    background: #fff;
    flex-shrink: 0;
  }

  .selected .card-check {
    background: var(--accent);
    border-color: var(--accent);
  }

  .card-check svg {
    display: none;
  }

  .selected .card-check svg {
    display: block;
  }

  .card-num {
    font-family: 'Outfit', sans-serif;
    font-weight: 900;
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: .35rem;
  }

  .card-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    line-height: 1.3;
    padding-right: 2rem;
    margin-bottom: .6rem;
  }

  .card-desc {
    font-size: .85rem;
    color: #555;
    line-height: 1.5;
    margin-bottom: .75rem;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: .4rem;
  }

  .tag {
    background: var(--tag-bg);
    border-radius: 6px;
    padding: .2rem .55rem;
    font-size: .75rem;
    color: var(--muted);
    font-weight: 500;
  }

  .selected .tag {
    background: rgba(232,76,61,.12);
    color: var(--accent);
  }

  /* Name field */
  .name-section {
    max-width: 1100px;
    margin: 0 auto 1.5rem;
    padding: 0 1.5rem;
  }

  .name-section label {
    display: block;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: .5rem;
  }

  .name-section input, .name-section select {
    width: 100%;
    max-width: 420px;
    padding: .75rem 1rem;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }

  .name-section input:focus, .name-section select:focus {
    border-color: var(--accent2);
  }

  .form-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .form-row > div {
    flex: 1;
    min-width: 200px;
  }

  /* Submit */
  .submit-section {
    max-width: 1100px;
    margin: 0 auto 4rem;
    padding: 0 1.5rem;
  }

  .email-hint {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-size: .9rem;
    color: var(--muted);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: flex-start;
    gap: .6rem;
  }

  .email-hint .icon { font-size: 1.1rem; flex-shrink: 0; }

  #emailTo {
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    padding: .4rem .7rem;
    border: 2px solid var(--border);
    border-radius: 7px;
    margin-top: .4rem;
    width: 100%;
    max-width: 340px;
    color: var(--text);
    background: var(--tag-bg);
    outline: none;
    transition: border-color .2s;
  }

  #emailTo:focus { border-color: var(--accent2); }

  .btn-submit {
    display: inline-flex;
    align-items: center;
    gap: .6rem;
    background: var(--accent);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    padding: .9rem 2rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background .2s, transform .15s;
  }

  .btn-submit:hover { background: #c73328; transform: translateY(-2px); }
  .btn-submit:disabled { background: #ccc; cursor: not-allowed; transform: none; }

  .error-msg {
    color: var(--accent);
    font-size: .9rem;
    margin-top: .75rem;
    font-weight: 500;
    min-height: 1.2em;
  }

  @media (max-width: 600px) {
    .workshops { grid-template-columns: 1fr; }
    .counter-bar { flex-wrap: wrap; }
    .progress-wrap { max-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>Workshop<span>-Wahl</span></h1>
  <p>Wähle genau <strong>7 Workshops</strong> aus, an denen du teilnehmen möchtest.</p>
</header>

<div class="counter-bar">
  <div class="counter-text"><span id="countNum">0</span> / 7 gewählt</div>
  <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div style="max-width:1100px;margin:2rem auto 1rem;padding:0 1.5rem;">
  <div class="form-row">
    <div>
      <label style="font-family:'Outfit',sans-serif;font-weight:700;display:block;margin-bottom:.5rem;">Dein Name *</label>
      <input type="text" id="studentName" placeholder="Vor- und Nachname" />
    </div>
    <div>
      <label style="font-family:'Outfit',sans-serif;font-weight:700;display:block;margin-bottom:.5rem;">Klasse *</label>
      <select id="studentClass">
        <option value="">– bitte wählen –</option>
        <option>5a</option><option>5b</option><option>5c</option>
        <option>6a</option><option>6b</option><option>6c</option>
        <option>7a</option><option>7b</option><option>7c</option>
        <option>8a</option><option>8b</option><option>8c</option>
        <option>9a</option><option>9b</option><option>9c</option>
        <option>10a</option><option>10b</option><option>10c</option>
      </select>
    </div>
  </div>
</div>

<div class="workshops" id="workshopGrid"></div>

<div class="submit-section">
  <div class="email-hint">
    <span class="icon">📧</span>
    <div>
      <strong>Wohin sollen die Antworten geschickt werden?</strong><br>
      <input type="email" id="emailTo" placeholder="juliane.krolle@hgs.bocholt.de" />
    </div>
  </div>
  <button class="btn-submit" id="submitBtn" disabled onclick="submitForm()">
    ✉️ Auswahl abschicken
  </button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
const workshops = [
  { num: 1,  title: "Tierheim",                   desc: "Einblick in den Beruf des Tierpflegers – du hilfst im Tierheim Bocholt mit.",                         where: "Tierheim Bocholt",          grade: "7–10" },
  { num: 2,  title: "Kardinal-Diepenbrock I",     desc: "Bewohner des Heims kennenlernen, Ausflüge ins Café, basteln und spielen.",                            where: "Kardinal-Diepenbrock-Heim", grade: "5–10" },
  { num: 3,  title: "Kardinal-Diepenbrock II",    desc: "Kneipp, gesunde Ernährung und wie du deinen Körper von innen stärkst.",                               where: "Kardinal-Diepenbrock-Heim", grade: "5–10" },
  { num: 4,  title: "Krav Maga",                  desc: "Selbstbewusstsein stärken und Selbstverteidigung erlernen.",                                           where: "Sporthalle HGS",            grade: "5–10" },
  { num: 5,  title: "Maker Space",                desc: "Mit computergesteuerten Maschinen eigene Produkte erstellen.",                                         where: "Maker Space",               grade: "5–10" },
  { num: 6,  title: "Graffiti",                   desc: "Kreativ mit der Sprühdose – gestalte dein eigenes Graffiti.",                                          where: "Schule",                    grade: "7–10" },
  { num: 7,  title: "Toilettengestaltung",        desc: "Unsere Schultoiletten verschönern – du kannst etwas verändern!",                                      where: "Schule",                    grade: "5–10" },
  { num: 8,  title: "Stolpersteine",              desc: "Das Leben jüdischer Einwohner Bocholts vor 1945 erkunden – inkl. Tagesfahrt nach Dorsten.",           where: "Bocholt & Dorsten",         grade: "7–10" },
  { num: 9,  title: "TUB Bocholt",                desc: "Cardio- & Krafttraining, Athletik, Teamspiele und Ernährungsworkshop.",                               where: "TUB Bocholt",               grade: "8–10" },
  { num: 10, title: "Interkulturelles Training",  desc: "Eigene Erfahrungen zu Vielfalt einbringen und neue Perspektiven kennenlernen.",                       where: "Schule",                    grade: "5–10" },
  { num: 11, title: "Insektenhotels",             desc: "Handwerklich tätig sein und ein Insektenhotel für das Schulgelände bauen.",                           where: "Schule",                    grade: "5–10" },
  { num: 12, title: "Stadtwald",                  desc: "In der Natur unterwegs: den Stadtwald und seine tierischen Bewohner kennenlernen.",                   where: "Schule",                    grade: "5–10" },
  { num: 13, title: "Weltreligionen",             desc: "Religion zum Anfassen – jeden Tag eine der drei Weltreligionen besuchen.",                            where: "Isselburg/Bocholt/Essen",   grade: "5–10" },
  { num: 14, title: "Stadtbibliothek",            desc: "Mit modernster Technik ein eigenes Hörspiel erstellen.",                                              where: "Stadtbücherei Bocholt",     grade: "6–7"  },
  { num: 15, title: "Social Media",               desc: "Reels, Fotos, Instagram, TikTok – kreative Medienarbeit.",                                            where: "Schule / Lernwerk",         grade: "7–10" },
  { num: 16, title: "Mein Körper – gesund bleiben", desc: "Fastfood aber gesund, Stressbewältigung und Hautschutz.",                                           where: "BK West",                   grade: "7–10" },
  { num: 17, title: "DLRG",                       desc: "Spaß im Wasser + Erste Hilfe im Ernstfall. Voraussetzung: Bronze-Abzeichen.",                         where: "Schwimmbad / DLRG",         grade: "5–10" },
  { num: 18, title: "Polizei – Demokratie stärken", desc: "Workshop der Polizei zum Thema Demokratie.",                                                        where: "Schule",                    grade: "5–10" },
  { num: 19, title: "Musik, Kunst & Schauspiel",  desc: "Kreativ werden in Musik, Kunst und Theater.",                                                         where: "Musikschule Bocholt",       grade: "5–10" },
  { num: 20, title: "Gesundes Kochen",            desc: "Die Basics für eine schnelle und gesunde Küche erlernen.",                                            where: "Küche HGS",                 grade: "5–10" },
  { num: 21, title: "Rockschule",                 desc: "Musik machen und ein eigenes Lied schreiben.",                                                        where: "HGS",                       grade: "5–10" },
  { num: 22, title: "Erste Hilfe (BK-West)",      desc: "Erste-Hilfe-Kurs mit überlebenswichtigen Tipps.",                                                     where: "BK West",                   grade: "7–10" },
  { num: 23, title: "Upcycling",                  desc: "Kreativ sein und aus alten Dingen Neues entwickeln.",                                                  where: "Schule",                    grade: "5–7"  },
];

const MAX = 7;
let selected = new Set();

function renderCards() {
  const grid = document.getElementById('workshopGrid');
  grid.innerHTML = '';
  workshops.forEach(w => {
    const card = document.createElement('div');
    card.className = 'workshop-card';
    card.id = 'card-' + w.num;
    card.onclick = () => toggleCard(w.num);
    card.innerHTML = `
      <div class="card-check">
        <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
          <path d="M1 5L5 9L12 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card-num">Workshop ${w.num}</div>
      <div class="card-title">${w.title}</div>
      <div class="card-desc">${w.desc}</div>
      <div class="card-tags">
        <span class="tag">📍 ${w.where}</span>
        <span class="tag">🎓 Klasse ${w.grade}</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

function toggleCard(num) {
  if (selected.has(num)) {
    selected.delete(num);
  } else {
    if (selected.size >= MAX) {
      document.getElementById('errorMsg').textContent = '⚠️ Du kannst maximal 7 Workshops wählen.';
      setTimeout(() => document.getElementById('errorMsg').textContent = '', 2500);
      return;
    }
    selected.add(num);
  }
  updateUI();
}

function updateUI() {
  const count = selected.size;
  document.getElementById('countNum').textContent = count;
  document.getElementById('progressFill').style.width = (count / MAX * 100) + '%';

  workshops.forEach(w => {
    const card = document.getElementById('card-' + w.num);
    if (selected.has(w.num)) {
      card.classList.add('selected');
      card.classList.remove('disabled');
    } else if (count >= MAX) {
      card.classList.add('disabled');
      card.classList.remove('selected');
    } else {
      card.classList.remove('selected', 'disabled');
    }
  });

  const canSubmit = count === MAX &&
    document.getElementById('studentName').value.trim() !== '' &&
    document.getElementById('studentClass').value !== '' &&
    document.getElementById('emailTo').value.trim() !== '';
  document.getElementById('submitBtn').disabled = !canSubmit;
  document.getElementById('errorMsg').textContent = '';
}

document.getElementById('studentName').addEventListener('input', updateUI);
document.getElementById('studentClass').addEventListener('change', updateUI);
document.getElementById('emailTo').addEventListener('input', updateUI);

function submitForm() {
  const name = document.getElementById('studentName').value.trim();
  const klasse = document.getElementById('studentClass').value;
  const to = document.getElementById('emailTo').value.trim();

  if (!name || !klasse || selected.size !== MAX) {
    document.getElementById('errorMsg').textContent = 'Bitte Name, Klasse und genau 7 Workshops auswählen.';
    return;
  }

  const selectedList = workshops
    .filter(w => selected.has(w.num))
    .map((w, i) => `${i + 1}. Workshop ${w.num}: ${w.title}`)
    .join('\n');

  const subject = encodeURIComponent(`Workshop-Wahl: ${name} (${klasse})`);
  const body = encodeURIComponent(
    `Workshop-Wahl\n${'='.repeat(30)}\n\nName: ${name}\nKlasse: ${klasse}\n\nGewählte Workshops:\n${selectedList}\n\n(Automatisch erstellt)`
  );

  window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
}

renderCards();
</script>

</body>
</html>
